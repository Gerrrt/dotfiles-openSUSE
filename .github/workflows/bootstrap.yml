# .github/workflows/bootstrap.yml
# Thin caller for the reusable bootstrap test authored in dotfiles-core. The logic
# lives there (one place for the whole fleet); this just names openSUSE's container +
# the deps bootstrap needs. See dotfiles-core/.github/workflows/bootstrap-test.yml.
name: bootstrap

on:
  pull_request:
    paths: ['bootstrap.sh', 'core/**', 'os/**', 'ssh/**', '.github/workflows/bootstrap.yml']
  push:
    branches: [main]
    paths: ['bootstrap.sh', 'core/**', 'os/**', 'ssh/**', '.github/workflows/bootstrap.yml']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    uses: Gerrrt/dotfiles-core/.github/workflows/bootstrap-test.yml@v2
    with:
      image: opensuse/tumbleweed
      prep: "zypper --non-interactive --gpg-auto-import-keys install bash zsh"
